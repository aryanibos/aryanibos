<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="100%" height="auto">
  <defs>
    <linearGradient id="footer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b081e" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Star Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Mountain Gradient -->
    <linearGradient id="mountain-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <rect width="1200" height="250" fill="url(#footer-grad)" rx="15"/>

  <!-- Glow behind quote -->
  <circle cx="600" cy="125" r="120" fill="#6366f1" opacity="0.1" filter="url(#glow)"/>

  <!-- Sunset Glow at Bottom -->
  <ellipse cx="600" cy="250" rx="400" ry="100" fill="#4338ca" opacity="0.25" filter="url(#glow)"/>

  <!-- Mountains -->
  <path d="M 0 250 L 200 200 L 400 230 L 600 170 L 800 220 L 1000 190 L 1200 250 Z" fill="url(#mountain-grad)" opacity="0.5"/>
  <path d="M 0 250 L 300 220 L 600 210 L 900 230 L 1200 200 L 1200 250 Z" fill="#020617" opacity="0.8"/>

  <!-- Person standing silhouette at the bottom right/center -->
  <g transform="translate(600, 200) scale(0.6)">
    <!-- Rock platform -->
    <path d="M -30 30 L 30 30 L 15 15 L -15 15 Z" fill="#020617"/>
    <!-- Person -->
    <circle cx="0" cy="-12" r="5" fill="#020617"/>
    <line x1="0" y1="-7" x2="0" y2="10" stroke="#020617" stroke-width="3.5"/>
    <line x1="0" y1="-3" x2="-6" y2="5" stroke="#020617" stroke-width="2.5"/>
    <line x1="0" y1="-3" x2="6" y2="5" stroke="#020617" stroke-width="2.5"/>
    <line x1="0" y1="10" x2="-5" y2="25" stroke="#020617" stroke-width="2.5"/>
    <line x1="0" y1="10" x2="5" y2="25" stroke="#020617" stroke-width="2.5"/>
  </g>

  <!-- Quote symbol -->
  <text x="600" y="65" text-anchor="middle" font-size="72" fill="#4f46e5" opacity="0.25" font-family="Georgia, serif">“</text>

  <!-- Quote Text -->
  <text x="600" y="115" text-anchor="middle" font-family="'Georgia', serif" font-style="italic" font-size="28" fill="#e2e8f0">The best way to predict the future is to invent it.</text>
  <text x="600" y="155" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#818cf8" font-weight="bold" letter-spacing="1">— Alan Kay</text>

  <!-- Thanks message -->
  <text x="600" y="215" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#64748b" font-weight="500">Thanks for visiting! Let's build something amazing together. 💜</text>
</svg>
