<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="40%" stop-color="#090514" />
      <stop offset="70%" stop-color="#0c0721" />
      <stop offset="100%" stop-color="#130524" />
    </linearGradient>

    <!-- Star Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Mountain Path Gradient -->
    <linearGradient id="mountain-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e1065" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="450" fill="url(#bg-grad)" rx="15"/>

  <!-- Glowing Nebulas -->
  <circle cx="200" cy="120" r="160" fill="#6d28d9" opacity="0.25" filter="url(#glow)"/>
  <circle cx="1000" cy="300" r="220" fill="#db2777" opacity="0.12" filter="url(#glow)"/>
  <circle cx="600" cy="220" r="180" fill="#4f46e5" opacity="0.18" filter="url(#glow)"/>

  <!-- Decorative Stars -->
  <circle cx="150" cy="80" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="280" cy="140" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="350" cy="70" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="850" cy="120" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="950" cy="90" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="1050" cy="160" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="700" cy="60" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- Planet -->
  <circle cx="980" cy="130" r="35" fill="#f472b6" opacity="0.15"/>
  <circle cx="980" cy="130" r="34" fill="none" stroke="#f472b6" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="980" cy="130" rx="60" ry="12" fill="none" stroke="#f472b6" stroke-width="1" transform="rotate(-15 980 130)" opacity="0.3"/>

  <!-- Stylized Mountain Silhouette at the bottom -->
  <path d="M 0 450 L 0 380 L 150 320 L 320 370 L 500 290 L 680 360 L 850 280 L 1050 340 L 1200 270 L 1200 450 Z" fill="url(#mountain-grad)"/>
  <path d="M 0 450 L 0 410 L 220 360 L 450 420 L 650 340 L 880 400 L 1100 330 L 1200 370 L 1200 450 Z" fill="#020617" opacity="0.9"/>

  <!-- Code Icon Circle & Glowing border -->
  <circle cx="600" cy="100" r="41" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="100" r="35" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="110" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#a78bfa" text-anchor="middle">&lt;/&gt;</text>

  <!-- Title Text -->
  <text x="600" y="180" font-family="'Segoe UI', system-ui, sans-serif" font-size="24" fill="#cbd5e1" font-weight="500" text-anchor="middle" letter-spacing="2">Hi there, I'm</text>
  
  <text x="600" y="260" font-family="'Outfit', 'Segoe UI', system-ui, sans-serif" font-size="76" font-weight="800" text-anchor="middle" letter-spacing="1">
    <tspan fill="#ffffff">Arya </tspan>
    <tspan fill="#818cf8">Isnaidi</tspan>
  </text>

  <text x="600" y="320" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="26" font-weight="600" fill="#c084fc" text-anchor="middle" letter-spacing="1">Full Stack Developer</text>

  <!-- Description Text -->
  <text x="600" y="375" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">I build scalable web applications and delightful user experiences</text>
  <text x="600" y="405" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">with modern technologies.</text>
</svg>
